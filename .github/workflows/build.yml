name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # تحميل مكتبة SDL2 وإعداد مجلد أندرويد
    - name: Download and Setup SDL2
      run: |
        wget https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.tar.gz
        tar -xzf SDL2-2.28.5.tar.gz
        mv SDL2-2.28.5 SDL2
        mkdir -p SDL2/android-project/app/src/main/cpp
        cp main.cpp CMakeLists.txt SDL2/android-project/app/src/main/cpp/

    # بناء ملف الـ APK باستخدام Gradle
    - name: Build with Gradle
      run: |
        cd SDL2/android-project
        chmod +x gradlew
        ./gradlew assembleDebug

    # رفع ملف الـ APK النهائي بإصدار v4 المعتمد
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: SDL2/android-project/app/build/outputs/apk/debug/app-debug.apk

