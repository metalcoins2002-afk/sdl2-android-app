name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    # تحميل وإعداد مكتبة SDL2 المخصصة لأندرويد تلقائياً سحابياً
    - name: Download SDL2 Source
      run: |
        wget https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.tar.gz
        tar -xzf SDL2-2.28.5.tar.gz
        mv SDL2-2.28.5 SDL2

    # تجميع المشروع واستخراج الـ APK باستخدام Gradle
    - name: Build with Gradle
      run: |
        cd SDL2/android-project
        ln -s ../../ ./app/src/main/cpp
        ./gradlew assembleDebug

    # رفع ملف الـ APK النهائي لتتمكن من تحميله
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug.apk
        path: SDL2/android-project/app/build/outputs/apk/debug/app-debug.apk

